name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image
        run: docker build -t fintech-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t fintech-frontend:${{ github.sha }} ./frontend

      - name: Run backend health check
        run: echo "Build successful

    deploy:
      runs-on: ubuntu-latest
      needs: build-and-push
  
      steps:
        - name: Checkout repo
          uses: actions/checkout@v3
  
        - name: Argo CD Deployment
          run: |
            echo "New image tag: ${{ github.sha }}"
            echo "Deployment successful"
